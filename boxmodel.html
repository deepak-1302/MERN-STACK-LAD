<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model</title>

<style>

.box{
width:200px;
height:100px;

padding:20px;      /* space inside border */

border:5px solid black;

margin:30px;       /* space outside border */

background-color:lightblue;
}

</style>

</head>

<body>

<h2>CSS Box Model Example</h2>

<div class="box">
This is a Box Model Example
</div>

</body>
</html>
