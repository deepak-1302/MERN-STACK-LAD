<!DOCTYPE html>
<html>
<head>
<title>CSS Colors Example</title>

<style>

h1{
color:red;              /* Color name */
}

p{
color:#00ff00;          /* Hex value */
}

div{
color:rgb(0,0,255);     /* RGB value */
}

span{
color:hsl(300,100%,50%); /* HSL value */
}

</style>

</head>

<body>

<h1>This is Red Color (Name)</h1>

<p>This is Green Color (Hex Code)</p>

<div>This is Blue Color (RGB)</div>

<span>This is Pink Color (HSL)</span>

</body>
</html>
