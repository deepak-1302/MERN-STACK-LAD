<!DOCTYPE html>
<html>
<head>
<title>JavaScript Loops</title>
</head>

<body>

<h2>Printing Numbers from 1 to 10</h2>

<script>

// For Loop
document.write("<h3>For Loop</h3>");
for(let i=1;i<=10;i++)
{
document.write(i + " ");
}

// While Loop
document.write("<h3>While Loop</h3>");
let j=1;
while(j<=10)
{
document.write(j + " ");
j++;
}

// Do While Loop
document.write("<h3>Do While Loop</h3>");
let k=1;
do
{
document.write(k + " ");
k++;
}
while(k<=10);

</script>

</body>
</html>
