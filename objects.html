<!DOCTYPE html>
<html>
<head>
<title>JavaScript Objects</title>
</head>

<body>

<h2>JavaScript Objects Example</h2>

<script>

// Math Object
document.write("Square Root of 25: " + Math.sqrt(25));
document.write("<br>");
document.write("Maximum of (10,20,30): " + Math.max(10,20,30));

document.write("<br><br>");

// String Object
var str = "Hello World";

document.write("String Length: " + str.length);
document.write("<br>");
document.write("Uppercase: " + str.toUpperCase());

document.write("<br><br>");

// Window Object
alert("This is Window Object Alert");

</script>

</body>
</html>
