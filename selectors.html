<!DOCTYPE html>
<html>
<head>
<title>CSS Selectors</title>

<style>

/* Universal selector */
*{
font-family: Arial;
}

/* Element selector */
p{
color:red;
}

/* ID selector */
#special{
color:blue;
}

/* Class selector */
.group{
color:green;
}

</style>

</head>

<body>

<h2>CSS Selectors Example</h2>

<p>This is element selector</p>

<p id="special">This is ID selector</p>

<p class="group">This is class selector</p>

<p class="group">Another class selector example</p>

</body>
</html>
