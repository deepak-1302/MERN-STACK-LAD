<!DOCTYPE html>
<html>
<head>
<title>HTML5 Semantic Tags</title>
</head>

<body>

<header>
<h1>My Website</h1>
<p>Welcome to my webpage</p>
</header>

<nav>
<a href="#">Home</a> |
<a href="#">About</a> |
<a href="#">Contact</a>
</nav>

<main>

<section>
<h2>Section Example</h2>

<article>
<h3>Article Title</h3>
<p>This is an example of article content.</p>
</article>

</section>

<aside>
<h3>Side Information</h3>
<p>This is additional information.</p>
</aside>

<figure>
<img src="https://via.placeholder.com/200">
<figcaption>Sample Image</figcaption>
</figure>

</main>

<footer>
<p>Copyright 2025</p>
</footer>

</body>
</html>
